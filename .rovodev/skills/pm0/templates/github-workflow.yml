name: PM0 Product CI

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pm0:
    name: PM0 product memory check
    runs-on: ubuntu-latest
    env:
      PM0_SKILL_DIR: .agents/skills/pm0
    steps:
      - uses: actions/checkout@v4

      - name: Collect pull request context
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            core.exportVariable("PM0_CHANGED_FILES", files.map((file) => file.filename).join("\n"));
            core.exportVariable("PM0_PR_BODY", context.payload.pull_request?.body || "");

      - name: Run PM0 product check
        run: node "$PM0_SKILL_DIR/scripts/product-ci.mjs"
